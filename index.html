<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robiul Rahman Sports TV Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.header{
    background:#111827;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:15px;
}

.player-section{
    flex:3;
    min-width:300px;
}

.video-container{
    background:#000;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.5);
}

video{
    width:100%;
    height:70vh;
    background:#000;
}

.channel-name{
    padding:12px;
    background:#111827;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.sidebar{
    flex:1;
    min-width:250px;
}

.channel{
    background:#1e293b;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
    border:1px solid #334155;
}

.channel:hover{
    background:#334155;
    transform:translateY(-2px);
}

.channel.active{
    background:#2563eb;
}

.status{
    text-align:center;
    padding:10px;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="header">
📺Robiul Sports TV Live
</div>

<div class="container">

<div class="player-section">
    <div class="video-container">
        <video id="video" controls autoplay></video>
        <div class="channel-name" id="channelName">
            Select a Channel
        </div>
    </div>
</div>

<div class="sidebar">

<div class="channel"
onclick="loadChannel(this,'Caze TV','https://dfr80qz435crc.cloudfront.net/MNOP/Amagi/Caze/Caze_TV_BR/1080p-vtt/index.m3u8')">
📺 Caze TV
</div>

<div class="channel"
onclick="loadChannel(this,'T Sports','http://rgkkw.live:80/live/1Aoen7elp5/IgMJ60tmAa/130714.ts')">
🏆 T Sports
</div>

<div class="channel"
onclick="loadChannel(this,'PTV Sports','https://tvsen5.aynaott.com/PtvSports/index.m3u8')">
⚽ PTV Sports
</div>

<div class="channel"
onclick="loadChannel(this,'T Sports 2','http://103.59.176.72:8083/live1/tracks-v1a1/mono.m3u8?token=123')">
🏅 T Sports 2
</div>

<div class="channel"
onclick="loadChannel(this,'beIN Sports 1','https://1nyaler.streamhostingcdn.top/stream/23/index.m3u8')">
🔥 beIN Sports 1
</div>

<div class="channel"
onclick="loadChannel(this,'Win Sports','https://1nyaler.streamhostingcdn.top/stream/32/index.m3u8')">
🎯 Win Sports
</div>

<div class="channel"
onclick="loadChannel(this,'DD Sports','https://d3qs3d2rkhfqrt.cloudfront.net/out/v1/b17adfe543354fdd8d189b110617cddd/index.m3u8')">
📺 DD Sports
</div>

<div class="channel"
onclick="loadChannel(this,'D Sports HD','http://217.26.190.76:8888/play/a0jb/index.m3u8')">
🏆 D Sports HD
</div>

<div class="channel"
onclick="loadChannel(this,'D Sports','http://190.117.20.37:8000/play/a08d/index.m3u8')">
⚽ D Sports
</div>

</div>

</div>

<div class="status">
  © 2026 RobiulRahman. All Rights Reserved..
</div>

<script>
let hls;

function loadChannel(element,name,url){

    document.querySelectorAll('.channel').forEach(c=>{
        c.classList.remove('active');
    });

    element.classList.add('active');

    document.getElementById('channelName').textContent = name;

    const video = document.getElementById('video');

    if(hls){
        hls.destroy();
    }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED,function(){
            video.play();
        });
    }
    else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src = url;
        video.play();
    }
}
</script>

</body>
</html>

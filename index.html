        :root {
            --bg-main: #0a0a0c;
            --bg-sidebar: #121215;
            --bg-card: #1c1c20;
            --bg-card-hover: #26262b;
            --accent-pink: #ec4899;
            --accent-pink-hover: #db2777;
            --text-main: #ffffff;
            --text-secondary: #71717a;
            --border-card: #27272a;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Main app layout wrapper */
        .app-container {
            display: flex;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        /* Player panel layout */
        .player-section {
            flex: 1.8;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #000;
        }

        /* Video overlay styled exactly as screenshot */
        .player-overlay-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 30px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .player-channel-title {
            font-size: 26px;
            font-weight: 800;
            color: #ffffff;
            text-transform: uppercase;
            pointer-events: auto;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }

        .download-btn {
            background-color: var(--accent-pink);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 14px rgba(236, 72, 153, 0.35);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .download-btn:hover {
            background-color: var(--accent-pink-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(236, 72, 153, 0.45);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        /* Sidebar panel layout */
        .sidebar {
            width: 480px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid #1f1f24;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-header {
            padding: 20px 20px 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-bottom: 1px solid #1c1c20;
        }

        /* Search input styling */
        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            background-color: #1a1a1e;
            border: 1px solid #2d2d34;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.15);
            background-color: #202025;
        }

        .search-input::placeholder {
            color: #52525b;
        }

        /* Categories horizontal scrolling menu */
        .categories-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .categories-container::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            background-color: #1a1a1e;
            color: var(--text-main);
            border: 1px solid #2d2d34;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-chip:hover {
            border-color: #3f3f46;
            background-color: #27272a;
        }

        .category-chip.active {
            background-color: var(--accent-pink);
            border-color: var(--accent-pink);
            color: #ffffff;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.25);
        }

        /* Channel grid container */
        .channels-grid-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px 20px 20px;
        }

        .channels-grid-container::-webkit-scrollbar {
            width: 6px;
        }

        .channels-grid-container::-webkit-scrollbar-track {
            background: var(--bg-sidebar);
        }

        .channels-grid-container::-webkit-scrollbar-thumb {
            background: #2d2d34;
            border-radius: 3px;
        }

        .channels-grid-container::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }

        /* 5-Column Grid */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        /* Channel tile styling */
        .channel-card {
            background-color: var(--bg-card);
            border: 1.5px solid transparent;
            border-radius: 12px;
            padding: 12px 5px 10px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            aspect-ratio: 1 / 1.05;
        }

        .channel-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .channel-card.active {
            border-color: var(--accent-pink);
            background-color: #1a1a24;
            box-shadow: 0 0 12px rgba(236, 72, 153, 0.2);
        }

        /* Channel circular badge logo */
        .logo-circle {
            width: 48px;
            height: 48px;
            background-color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 8px;
            padding: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s ease;
        }

        .channel-card:hover .logo-circle {
            transform: scale(1.05);
        }

        .logo-circle svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .channel-title {
            font-size: 8.5px;
            font-weight: 700;
            color: #e4e4e7;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        /* Big center play icon overlay when loading/paused */
        .center-play-btn {
            position: absolute;
            width: 76px;
            height: 76px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }

        .center-play-btn::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-top: 14px solid transparent;
            border-bottom: 14px solid transparent;
            border-left: 22px solid #000;
            margin-left: 6px;
        }

        .center-play-btn:hover {
            transform: scale(1.1);
            background-color: #ffffff;
            box-shadow: 0 6px 24px rgba(255, 255, 255, 0.2);
        }

        .hidden {
            display: none !important;
        }

        /* App Branding header style */
        .brand-title {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            padding-left: 2px;
        }
        
        .brand-icon {
            -webkit-text-fill-color: initial;
        }

        /* Attribution footer */

            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            border-top: 1px solid #1c1c20;
            background-color: var(--bg-sidebar);
            font-weight: 500;
        }

        /* Toast notification */
        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background-color: #1c1c20;
            border-left: 4px solid var(--accent-pink);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* Responsive Layouts */

                width: 420px;
            }

            }
        }

            body {
                overflow-y: auto;
                height: auto;
            }
            .app-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .player-section {
                height: 56.25vw;
                min-height: 300px;
            }
            .sidebar {
                width: 100%;
                height: auto;
                border-left: none;
                border-top: 1px solid #1f1f24;
            }
            .channels-grid-container {
                overflow-y: visible;
                height: auto;
            }
            .channels-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        @media (max-width: 600px) {
            .channels-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            .player-channel-title {
                font-size: 20px;
            }
            .download-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .channels-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

</head>

// Categories list matching image
const categories = ["All", "Sports", "News", "Bangla", "Indian Bangla", "Hindi", "Kids", "Doc", "Music"];

let hls;
let activeChannelId = null;
let activeCategory = "All";
let searchQuery = "";

// Initialize application state
function initApp() {
    renderCategories();
    renderChannels();
    
    // Auto-select first channel (TSPORTS HD)
    const initialChannel = channels.find(c => c.id === "tsports") || channels[0];
    if (initialChannel) {
        selectChannel(initialChannel.id);
    }
}

// Render Category filter list
function renderCategories() {
    const container = document.getElementById("categoriesContainer");
    container.innerHTML = categories.map(cat => `
        <div class="category-chip ${cat === activeCategory ? 'active' : ''}" 
             onclick="selectCategory(this, '${cat}')">
            ${cat}
        </div>
    `).join("");
}

// Handle Category click events
function selectCategory(element, category) {
    document.querySelectorAll(".category-chip").forEach(chip => {
        chip.classList.remove("active");
    });
    element.classList.add("active");
    activeCategory = category;
    renderChannels();
}

// Real-time Search input binding
function handleSearch() {
    searchQuery = document.getElementById("searchInput").value.toLowerCase();
    renderChannels();
}

// Render dynamic 5-column channel grid
function renderChannels() {
    const grid = document.getElementById("channelsGrid");
    
    const filtered = channels.filter(ch => {
        const matchesCategory = activeCategory === "All" || ch.category === activeCategory;
        const matchesSearch = ch.name.toLowerCase().includes(searchQuery);
        return matchesCategory && matchesSearch;
    });
    
    if (filtered.length === 0) {
        grid.innerHTML = `
            <div style="grid-column: span 5; text-align: center; color: var(--text-secondary); padding: 40px 0; font-size: 13px;">
                No channels found
            </div>`;
        return;
    }
    
    grid.innerHTML = filtered.map(ch => `
        <div class="channel-card ${ch.id === activeChannelId ? 'active' : ''}" 
             id="card-${ch.id}"
             onclick="selectChannel('${ch.id}')"
             title="${ch.name}">
            <div class="logo-circle">
                ${getLogoSVG(ch)}
            </div>
            <div class="channel-title">${ch.name}</div>
        </div>
    `).join("");
}

// Channel Selection handler & HLS player setup
function selectChannel(channelId) {
    const ch = channels.find(c => c.id === channelId);
    if (!ch) return;
    
    activeChannelId = channelId;
    
    // Update active highlight classes
    document.querySelectorAll(".channel-card").forEach(card => {
        card.classList.remove("active");
    });
    const activeCard = document.getElementById(`card-${channelId}`);
    if (activeCard) {
        activeCard.classList.add("active");
    }
    
    // Update overlay text
    document.getElementById("playerChannelTitle").textContent = ch.name;
    
    const video = document.getElementById("video");
    const playBtn = document.getElementById("centerPlayBtn");
    
    playBtn.classList.add("hidden");
    
    if (hls) {
        hls.destroy();
    }
    
    if (Hls.isSupported()) {
        hls = new Hls({
            maxMaxBufferLength: 10,
            enableWorker: true
        });
        hls.loadSource(ch.url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play().catch(e => {
                console.log("Auto-play blocked, showing center play button overlay", e);
                playBtn.classList.remove("hidden");
            });
        });
        
        // Dynamic fallback error handler
        hls.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                switch(data.type) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.log("HLS network error, attempting recovery...");
                        hls.startLoad();
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.log("HLS media error, attempting recovery...");
                        hls.recoverMediaError();
                        break;
                    default:
                        console.log("HLS player fatal error, falling back...");
                        hls.destroy();
                        playBtn.classList.remove("hidden");
                        break;
                }
            }
        });
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Native Safari HLS support
        video.src = ch.url;
        video.play().catch(e => {
            console.log("Auto-play blocked, showing center play button overlay", e);
            playBtn.classList.remove("hidden");
        });
    }
}

// Center play overlay helper
function togglePlay() {
    const video = document.getElementById("video");
    const playBtn = document.getElementById("centerPlayBtn");
    if (video.paused) {
        video.play().then(() => {
            playBtn.classList.add("hidden");
        }).catch(err => console.error("Play failed:", err));
    } else {
        video.pause();
        playBtn.classList.remove("hidden");
    }
}

// Toast notification helper
function showDownloadToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}

// Listen for DOM load to initialize
document.addEventListener("DOMContentLoaded", initApp);
</script>
